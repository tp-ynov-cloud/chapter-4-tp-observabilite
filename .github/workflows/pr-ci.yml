name: PR - CI (tests)

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.1
          cache: npm
          cache-dependency-path: api/package-lock.json

      - run: npm ci
      - run: npm test
